apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: python-app

  template:
    metadata:
      labels:
        app: python-app
    spec:

      imagePullSecrets:
      - name: dockerhub-secret   # ✅ REQUIRED if repo is private

      containers:
      - name: python-app
        image: boobesh18/python-ci-cd:IMAGE_TAG
        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
